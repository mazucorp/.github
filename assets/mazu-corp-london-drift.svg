<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="941" viewBox="0 0 1680 941" role="img" aria-labelledby="title description">
  <title id="title">MAZU CORP London boardroom</title>
  <desc id="description">A MAZU CORP boardroom overlooking the City of London with a subtle drifting motion.</desc>
  <defs>
    <clipPath id="rounded-frame">
      <rect x="3" y="3" width="1674" height="935" rx="30"/>
    </clipPath>
    <style>
      .drift {
        animation: mazu-drift 18s ease-in-out infinite;
        transform-origin: center;
      }

      @keyframes mazu-drift {
        0%, 100% { transform: translate(-5px, -3px); }
        50% { transform: translate(5px, 3px); }
      }

      @media (prefers-reduced-motion: reduce) {
        .drift { animation: none; }
      }
    </style>
  </defs>

  <rect width="1680" height="941" rx="33" fill="#03223F"/>
  <g clip-path="url(#rounded-frame)">
    <image class="drift" href="mazu-corp-london.png" x="-14" y="-8" width="1708" height="957" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <rect x="3" y="3" width="1674" height="935" rx="30" fill="none" stroke="#03223F" stroke-width="6" stroke-opacity="0.78"/>
</svg>
